<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Santos Taxi Tablet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="tablet" class="hidden">
        <div class="tablet-stage" id="tabletStage">
            <section class="tablet-frame" id="tabletFrame">
                <header class="tablet-topbar">
                    <div class="tablet-title">Los Santos Taxi</div>

                    <div class="tablet-buttons">
                        <button id="settingsBtn" type="button" title="Einstellungen">⚙</button>
                        <button id="closeBtn" type="button" title="Schließen">×</button>
                    </div>
                </header>

                <aside id="settingsPanel" class="settings-panel hidden">
                    <h3>Tablet-Einstellungen</h3>

                    <label for="opacitySlider">
                        <span>Transparenz</span>
                        <strong id="opacityValue">100%</strong>
                    </label>
                    <input id="opacitySlider" type="range" min="20" max="100" value="100">

                    <label for="sizeSlider">
                        <span>Tablet-Größe</span>
                        <strong id="sizeValue">100%</strong>
                    </label>
                    <input id="sizeSlider" type="range" min="70" max="120" value="100">

                    <button id="settingsCloseBtn" type="button">Schließen</button>
                </aside>

                <section class="tablet-screen" id="tabletScreen">
                    <iframe
                        src="https://los-santos-taxi.michaeltimmler91.workers.dev/?tablet=3"
                        frameborder="0"
                        allow="clipboard-read; clipboard-write">
                    </iframe>
                </section>
            </section>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
